# Netlify config — Profit OS (Vite SPA)
# Env vars à définir dans Netlify UI (Site settings → Environment variables) :
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (voir .env.example)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA : toutes les routes côté client (React Router) retombent sur index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# La police embarquée dans l'export PDF ne change jamais → cache long
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
